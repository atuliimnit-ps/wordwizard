<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WordWise — Daily Language Learning</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --cream: #faf6ee;
    --warm: #f5ede0;
    --gold: #c8922a;
    --gold-light: #e8b84b;
    --rust: #b85c38;
    --sage: #5a7a5c;
    --blue: #2d5a8e;
    --card-bg: #fffdf8;
    --shadow: rgba(26,18,8,0.12);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }
  header {
    text-align: center;
    padding: 3rem 1.5rem 2rem;
    position: relative;
    z-index: 1;
  }
  .header-eyebrow {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.75rem;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.8rem, 8vw, 5rem);
    font-weight: 900;
    line-height: 1;
    color: var(--ink);
    letter-spacing: -0.02em;
  }
  h1 span { color: var(--gold); font-style: italic; }
  .header-sub {
    font-size: 0.95rem;
    color: #7a6a55;
    margin-top: 0.75rem;
    font-weight: 300;
  }

  /* API SETUP */
  .api-setup {
    max-width: 520px;
    margin: 1rem auto 2rem;
    padding: 1.5rem;
    background: var(--card-bg);
    border: 1.5px solid #e8dcc8;
    border-radius: 16px;
    box-shadow: 0 4px 24px var(--shadow);
    position: relative;
    z-index: 1;
  }
  .api-setup h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    margin-bottom: 0.4rem;
  }
  .api-setup p {
    font-size: 0.82rem;
    color: #8a7a65;
    margin-bottom: 0.9rem;
    line-height: 1.5;
  }
  .api-setup p a { color: var(--gold); font-weight: 600; }
  .api-input-row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }
  .api-input-row input {
    flex: 1;
    padding: 0.7rem 1rem;
    border: 1.5px solid #e0d4bc;
    border-radius: 10px;
    font-family: monospace;
    font-size: 0.82rem;
    background: var(--cream);
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
    min-width: 0;
  }
  .api-input-row input:focus { border-color: var(--gold); }
  .btn-save {
    padding: 0.7rem 1.2rem;
    background: var(--gold);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .btn-save:hover { background: var(--gold-light); }
  .btn-test {
    width: 100%;
    padding: 0.6rem;
    background: var(--warm);
    border: 1.5px solid #e0d4bc;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    color: #6a4a20;
    margin-bottom: 0.5rem;
    transition: background 0.2s;
  }
  .btn-test:hover { background: #ecdcc8; }
  #apiStatus {
    font-size: 0.8rem;
    padding: 0.6rem 0.8rem;
    border-radius: 8px;
    line-height: 1.5;
    word-break: break-word;
    display: none;
  }
  #apiStatus.ok { background: #eefff2; color: #2a6a3a; font-weight: 600; }
  #apiStatus.err { background: #fff0f0; color: #c03030; }
  #apiStatus.info { background: #fff8ee; color: #7a4a10; }

  /* NAV */
  .nav-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    justify-content: center;
    padding: 0 1rem 2rem;
    position: relative;
    z-index: 1;
    max-width: 700px;
    margin: 0 auto;
  }
  .nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.35rem;
    padding: 1.1rem 1.5rem;
    background: var(--card-bg);
    border: 1.5px solid #e8dcc8;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 2px 12px var(--shadow);
    min-width: 120px;
    font-family: 'DM Sans', sans-serif;
    text-align: center;
  }
  .nav-btn:hover { transform: translateY(-4px) scale(1.04); box-shadow: 0 8px 28px var(--shadow); }
  .nav-btn:active { transform: scale(0.97); }
  .nav-btn.active { border-color: var(--gold); box-shadow: 0 6px 24px rgba(200,146,42,0.25); transform: translateY(-3px); }
  .nav-icon { font-size: 1.8rem; }
  .nav-label { font-size: 0.8rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink); }
  .nav-sub { font-size: 0.68rem; color: #9a8a75; font-weight: 400; }

  /* CONTENT */
  .content-area {
    max-width: 720px;
    margin: 0 auto 4rem;
    padding: 0 1rem;
    position: relative;
    z-index: 1;
  }
  .placeholder { text-align: center; padding: 4rem 2rem; color: #b0a090; }
  .placeholder .ph-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
  .placeholder p { font-size: 0.95rem; font-style: italic; }

  /* LOADING */
  .loading { text-align: center; padding: 3rem; }
  .loader {
    display: inline-block;
    width: 40px; height: 40px;
    border: 3px solid #e8dcc8;
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { color: #9a8a75; font-style: italic; font-size: 0.9rem; }

  /* CARDS */
  .card {
    background: var(--card-bg);
    border: 1.5px solid #e8dcc8;
    border-radius: 20px;
    padding: 1.75rem;
    margin-bottom: 1rem;
    box-shadow: 0 4px 20px var(--shadow);
    animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .card:nth-child(2) { animation-delay: 0.08s; }
  .card:nth-child(3) { animation-delay: 0.16s; }
  .card:nth-child(4) { animation-delay: 0.24s; }
  .card:nth-child(5) { animation-delay: 0.32s; }

  .word-header { display: flex; align-items: baseline; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 0.5rem; }
  .word-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; color: var(--ink); }
  .word-pos { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: white; background: var(--gold); padding: 0.2rem 0.6rem; border-radius: 99px; }
  .word-number { font-size: 0.75rem; color: #c0b09a; font-weight: 500; margin-left: auto; }
  .pronunciation {
    display: flex; align-items: center; gap: 0.5rem;
    margin-bottom: 0.9rem; padding: 0.6rem 0.9rem;
    background: var(--warm); border-radius: 10px; border-left: 3px solid var(--gold);
  }
  .pron-text { font-size: 0.88rem; color: #6a5a45; font-style: italic; flex: 1; }
  .definition { font-size: 0.95rem; color: #4a3a2a; line-height: 1.65; margin-bottom: 1rem; }
  .section-label { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; }
  .example { padding: 0.6rem 0.9rem; border-left: 2px solid #e0d4bc; margin-bottom: 0.45rem; font-size: 0.88rem; color: #5a4a38; line-height: 1.55; font-style: italic; }

  .quote-card { background: linear-gradient(135deg, #1a2a4a, #2d4570); border: none; color: white; }
  .quote-marks { font-family: 'Playfair Display', serif; font-size: 5rem; color: rgba(255,255,255,0.15); line-height: 0.8; margin-bottom: -1.2rem; }
  .quote-text { font-family: 'Playfair Display', serif; font-size: clamp(1.1rem, 3vw, 1.4rem); font-style: italic; line-height: 1.6; color: rgba(255,255,255,0.95); margin-bottom: 1.25rem; }
  .quote-author { font-size: 0.82rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold-light); }
  .quote-meaning { margin-top: 1rem; padding: 0.85rem; background: rgba(255,255,255,0.08); border-radius: 10px; font-size: 0.85rem; color: rgba(255,255,255,0.75); line-height: 1.55; }

  .phrase-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; color: var(--sage); margin-bottom: 0.35rem; }
  .phrase-meaning { font-size: 0.88rem; color: #4a5a4a; margin-bottom: 0.75rem; line-height: 1.55; }

  .idiom-banner { background: linear-gradient(135deg, #4a1a1a, #7a2a1a); margin: -1.75rem -1.75rem 1.25rem; padding: 1.25rem 1.75rem; border-radius: 18px 18px 0 0; }
  .idiom-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; color: white; }
  .idiom-origin { font-size: 0.82rem; color: #8a6a55; margin-bottom: 0.75rem; padding: 0.5rem 0.8rem; background: var(--warm); border-radius: 8px; line-height: 1.5; }

  .error-card { background: #fff5f5; border-color: #f5c0c0; text-align: center; padding: 2rem; animation: slideUp 0.3s ease both; }
  .error-icon { font-size: 2rem; margin-bottom: 0.5rem; }
  .error-msg { font-size: 0.88rem; color: #c04040; line-height: 1.6; word-break: break-word; }

  .section-header { text-align: center; margin-bottom: 1.5rem; animation: slideUp 0.35s ease both; }
  .section-header h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; color: var(--ink); }
  .section-header p { font-size: 0.82rem; color: #9a8a75; margin-top: 0.25rem; }
  .ornament { text-align: center; font-size: 1.2rem; color: #c8b89a; margin: 0.5rem 0 1.5rem; letter-spacing: 0.5rem; animation: slideUp 0.35s ease both; }

  .change-key-btn { background: none; border: none; font-size: 0.75rem; color: #b0a090; cursor: pointer; text-decoration: underline; font-family: 'DM Sans', sans-serif; display: block; margin: 0 auto 2rem; }

  @media (max-width: 480px) {
    .nav-btn { min-width: calc(50% - 0.375rem); flex: 1; }
    .card { padding: 1.25rem; }
    .idiom-banner { margin: -1.25rem -1.25rem 1rem; padding: 1rem 1.25rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-eyebrow">✦ Daily Language Learning ✦</div>
  <h1>Word<span>Wise</span></h1>
  <p class="header-sub">Expand your vocabulary, one beautiful word at a time.</p>
</header>

<div class="api-setup" id="apiSetup">
  <h3>🔑 Enter your Gemini API Key</h3>
  <p>Get a free key at <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a> → click <strong>"Create API key"</strong>. It's free.</p>
  <div class="api-input-row">
    <input type="text" id="apiKeyInput" placeholder="Paste full API key here"
      autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" />
    <button class="btn-save" onclick="saveKey()">Save</button>
  </div>
  <button class="btn-test" onclick="testKey()">🧪 Test API Key first</button>
  <div id="apiStatus"></div>
</div>

<div class="nav-grid">
  <button class="nav-btn words" onclick="fetch5Words()">
    <span class="nav-icon">📖</span>
    <span class="nav-label">Words</span>
    <span class="nav-sub">5 words of the day</span>
  </button>
  <button class="nav-btn quotes" onclick="fetchQuote()">
    <span class="nav-icon">💬</span>
    <span class="nav-label">Quote</span>
    <span class="nav-sub">Thought for the day</span>
  </button>
  <button class="nav-btn phrases" onclick="fetch5Phrases()">
    <span class="nav-icon">🗣️</span>
    <span class="nav-label">Phrases</span>
    <span class="nav-sub">5 phrases to learn</span>
  </button>
  <button class="nav-btn idioms" onclick="fetchIdiom()">
    <span class="nav-icon">🌿</span>
    <span class="nav-label">Idiom</span>
    <span class="nav-sub">Idiom of the day</span>
  </button>
</div>

<div class="content-area" id="contentArea">
  <div class="placeholder">
    <div class="ph-icon">✨</div>
    <p>Tap a button above to begin your daily learning</p>
  </div>
</div>

<button class="change-key-btn" onclick="changeKey()">🔑 Change API Key</button>

<script>
const STORAGE_KEY = 'wordwise_gemini_key';
let currentKey = '';

// ── KEY MANAGEMENT ──
function saveKey() {
  const val = document.getElementById('apiKeyInput').value.trim();
  if (!val) { showStatus('Please paste your API key first.', 'err'); return; }
  currentKey = val;
  localStorage.setItem(STORAGE_KEY, val);
  showStatus('✓ Saved! Now tap Test API Key to verify it works.', 'ok');
}

function loadKey() {
  const k = localStorage.getItem(STORAGE_KEY);
  if (k) {
    currentKey = k;
    document.getElementById('apiSetup').style.display = 'none';
  }
}

function getKey() {
  if (!currentKey) {
    document.getElementById('apiSetup').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return null;
  }
  return currentKey;
}

function changeKey() {
  currentKey = '';
  localStorage.removeItem(STORAGE_KEY);
  document.getElementById('apiKeyInput').value = '';
  document.getElementById('apiStatus').style.display = 'none';
  document.getElementById('apiSetup').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showStatus(msg, type) {
  const el = document.getElementById('apiStatus');
  el.textContent = msg;
  el.className = type;
  el.style.display = 'block';
}

// ── TEST KEY ──
async function testKey() {
  const val = document.getElementById('apiKeyInput').value.trim() || currentKey;
  if (!val) { showStatus('Paste your API key above first, then test.', 'err'); return; }

  showStatus('⏳ Testing key — please wait...', 'info');

  const models = ['gemini-2.0-flash', 'gemini-1.5-flash', 'gemini-pro'];
  let worked = false;

  for (const model of models) {
    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${val}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: 'Say: OK' }] }],
            generationConfig: { maxOutputTokens: 10 }
          })
        }
      );
      const data = await res.json();
      if (res.ok && data.candidates) {
        currentKey = val;
        localStorage.setItem(STORAGE_KEY, val);
        showStatus(`✅ Key works! Using model: ${model}. Tap Save then use the app!`, 'ok');
        worked = true;
        break;
      } else {
        const errMsg = data?.error?.message || `HTTP ${res.status}`;
        if (res.status === 400 || res.status === 401 || res.status === 403) {
          showStatus(`❌ Key rejected by Google: "${errMsg}"\n\nPlease create a NEW key at aistudio.google.com/app/apikey`, 'err');
          return;
        }
      }
    } catch (e) {
      // network error, continue
    }
  }

  if (!worked) {
    showStatus('❌ Could not connect. Check your internet or try a new key at aistudio.google.com/app/apikey', 'err');
  }
}

// ── GEMINI CALL ──
async function callGemini(prompt) {
  const key = getKey();
  if (!key) throw new Error('NO_KEY');

  const models = ['gemini-2.0-flash', 'gemini-1.5-flash', 'gemini-1.5-flash-latest', 'gemini-pro'];
  let lastError = 'Unknown error';

  for (const model of models) {
    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { temperature: 0.9, maxOutputTokens: 1800 }
          })
        }
      );

      if (res.status === 404) continue;

      const data = await res.json();

      if (!res.ok) {
        lastError = data?.error?.message || `HTTP ${res.status}`;
        if (res.status === 400 || res.status === 401 || res.status === 403) break;
        continue;
      }

      const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
      if (text) return text;
    } catch (e) {
      lastError = e.message;
    }
  }

  throw new Error(lastError);
}

// ── UI HELPERS ──
function setActive(type) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const map = { words: 0, quote: 1, phrases: 2, idiom: 3 };
  document.querySelectorAll('.nav-btn')[map[type]].classList.add('active');
}

function showLoading(msg) {
  document.getElementById('contentArea').innerHTML = `
    <div class="loading"><div class="loader"></div><p>${msg}</p></div>`;
}

function showError(msg) {
  document.getElementById('contentArea').innerHTML = `
    <div class="card error-card">
      <div class="error-icon">⚠️</div>
      <div class="error-msg">${msg}</div>
    </div>`;
}

function parseJSON(text) {
  // strip markdown code fences
  text = text.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
  const match = text.match(/\[[\s\S]*\]|\{[\s\S]*\}/);
  if (match) return JSON.parse(match[0]);
  throw new Error('Could not parse response as JSON');
}

// ── 5 WORDS ──
async function fetch5Words() {
  setActive('words');
  showLoading('Discovering beautiful words for you…');
  const prompt = `Give me 5 interesting English vocabulary words for daily learning. Return ONLY a JSON array:
[{"word":"Ephemeral","part_of_speech":"adjective","pronunciation":"ih-FEM-er-ul","pronunciation_tip":"Stress the FEM syllable","definition":"Lasting for a very short time.","examples":["The ephemeral beauty of cherry blossoms is precious.","Social trends are often ephemeral.","She chased ephemeral dreams."]}]
Return exactly 5 words. ONLY the JSON array, nothing else.`;
  try {
    const text = await callGemini(prompt);
    renderWords(parseJSON(text));
  } catch (e) {
    if (e.message === 'NO_KEY') return;
    showError(`Error: ${e.message}<br><br><small>Tap "Change API Key" below and test your key again.</small>`);
  }
}

function renderWords(words) {
  const area = document.getElementById('contentArea');
  area.innerHTML = `<div class="section-header"><h2>5 Words of the Day</h2><p>Learn, pronounce, and use them confidently</p></div><div class="ornament">· · ✦ · ·</div>`;
  words.forEach((w, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${i * 0.09}s`;
    card.innerHTML = `
      <div class="word-header">
        <span class="word-title">${w.word}</span>
        <span class="word-pos">${w.part_of_speech || 'word'}</span>
        <span class="word-number">${i + 1} / 5</span>
      </div>
      <div class="pronunciation">
        <span>🔊</span>
        <span class="pron-text"><strong>${w.pronunciation}</strong>${w.pronunciation_tip ? ' — ' + w.pronunciation_tip : ''}</span>
      </div>
      <div class="definition">${w.definition}</div>
      <div class="section-label">Example Sentences</div>
      ${(w.examples||[]).map(ex => `<div class="example">"${ex}"</div>`).join('')}`;
    area.appendChild(card);
  });
}

// ── QUOTE ──
async function fetchQuote() {
  setActive('quote');
  showLoading('Finding today\'s perfect quote…');
  const prompt = `Give me an inspiring quote of the day. Return ONLY this JSON:
{"quote":"The quote text here.","author":"Author Name","meaning":"2-3 sentence explanation of the quote and how to apply it."}
ONLY the JSON, nothing else.`;
  try {
    const text = await callGemini(prompt);
    renderQuote(parseJSON(text));
  } catch (e) {
    if (e.message === 'NO_KEY') return;
    showError(`Error: ${e.message}`);
  }
}

function renderQuote(q) {
  document.getElementById('contentArea').innerHTML = `
    <div class="section-header"><h2>Quote of the Day</h2><p>A thought to carry with you</p></div>
    <div class="ornament">· · ✦ · ·</div>
    <div class="card quote-card">
      <div class="quote-marks">"</div>
      <div class="quote-text">${q.quote}</div>
      <div class="quote-author">— ${q.author}</div>
      <div class="quote-meaning">💡 ${q.meaning}</div>
    </div>`;
}

// ── 5 PHRASES ──
async function fetch5Phrases() {
  setActive('phrases');
  showLoading('Curating powerful phrases for you…');
  const prompt = `Give me 5 useful English phrases or expressions. Return ONLY a JSON array:
[{"phrase":"Break the ice","type":"Social expression","meaning":"To relieve tension or start a conversation.","examples":["He told a joke to break the ice.","A compliment can break the ice with new colleagues."],"tip":"Use in unfamiliar social settings."}]
Exactly 5 phrases. ONLY the JSON array, nothing else.`;
  try {
    const text = await callGemini(prompt);
    renderPhrases(parseJSON(text));
  } catch (e) {
    if (e.message === 'NO_KEY') return;
    showError(`Error: ${e.message}`);
  }
}

function renderPhrases(phrases) {
  const area = document.getElementById('contentArea');
  area.innerHTML = `<div class="section-header"><h2>5 Phrases to Learn</h2><p>Speak more naturally and confidently</p></div><div class="ornament">· · ✦ · ·</div>`;
  phrases.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${i * 0.09}s`;
    card.innerHTML = `
      <div class="word-header">
        <span class="phrase-title">${p.phrase}</span>
        <span class="word-pos" style="background:var(--sage)">${p.type || 'phrase'}</span>
        <span class="word-number">${i + 1} / 5</span>
      </div>
      <div class="phrase-meaning">${p.meaning}</div>
      <div class="section-label">In Context</div>
      ${(p.examples||[]).map(ex => `<div class="example">"${ex}"</div>`).join('')}
      ${p.tip ? `<div style="margin-top:0.75rem;padding:0.6rem 0.9rem;background:#f0f8f1;border-radius:8px;font-size:0.82rem;color:#4a6a4a;">💡 <strong>Tip:</strong> ${p.tip}</div>` : ''}`;
    area.appendChild(card);
  });
}

// ── IDIOM ──
async function fetchIdiom() {
  setActive('idiom');
  showLoading('Unearthing today\'s idiom…');
  const prompt = `Give me an interesting English idiom of the day. Return ONLY this JSON:
{"idiom":"Once in a blue moon","meaning":"Something that happens very rarely.","origin":"Brief history of the phrase.","examples":["I only see my cousin once in a blue moon.","We get snow here once in a blue moon.","He smiles once in a blue moon."],"usage_tip":"When to use this idiom."}
ONLY the JSON, nothing else.`;
  try {
    const text = await callGemini(prompt);
    renderIdiom(parseJSON(text));
  } catch (e) {
    if (e.message === 'NO_KEY') return;
    showError(`Error: ${e.message}`);
  }
}

function renderIdiom(d) {
  document.getElementById('contentArea').innerHTML = `
    <div class="section-header"><h2>Idiom of the Day</h2><p>Master the language people actually speak</p></div>
    <div class="ornament">· · ✦ · ·</div>
    <div class="card">
      <div class="idiom-banner">
        <div class="section-label" style="color:rgba(255,255,255,0.6)">🌿 Today's Idiom</div>
        <div class="idiom-title">${d.idiom}</div>
      </div>
      <div class="definition" style="margin-bottom:0.9rem"><strong>Meaning:</strong> ${d.meaning}</div>
      ${d.origin ? `<div class="idiom-origin">📜 <strong>Origin:</strong> ${d.origin}</div>` : ''}
      <div class="section-label" style="margin-top:0.75rem">Example Sentences</div>
      ${(d.examples||[]).map(ex => `<div class="example">"${ex}"</div>`).join('')}
      ${d.usage_tip ? `<div style="margin-top:0.75rem;padding:0.7rem 0.9rem;background:#fff8ee;border-radius:8px;font-size:0.83rem;color:#6a4a20;border-left:3px solid var(--gold);">💡 <strong>When to use it:</strong> ${d.usage_tip}</div>` : ''}
    </div>`;
}

loadKey();
</script>
